name: Deploy to GitHub Pages (legacy push)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create gh-pages branch
        run: |
          git worktree add out gh-pages || true
          rsync -a --delete ./ out/
          cd out
          git add --all
          git commit -m "Deploy site: $GITHUB_SHA" || true
          git push origin gh-pages --force
