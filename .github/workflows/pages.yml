name: Deploy to GitHub Pages (orphan push)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages (create orphan if needed)
        run: |
          mkdir out
          git --work-tree=out rm -rf . || true
          rsync -a --delete --exclude='.git' ./ out/
          cd out
          if git show-ref --quiet refs/heads/gh-pages; then
            git add --all
            git commit -m "Deploy site: $GITHUB_SHA" || true
            git push origin HEAD:gh-pages --force
          else
            git init
            git checkout --orphan gh-pages
            git add --all
            git commit -m "Deploy site: $GITHUB_SHA"
            git push origin gh-pages --force
          fi
